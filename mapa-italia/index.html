<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mapa das Igrejas da Itália</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
height:100vh;

font-family:"Inter", sans-serif;

background-image:url("coliseu.jpg");
background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

padding:30px;
}

/* escurecer fundo */

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* fade */

.fade-out{
opacity:0;
transition:opacity .25s ease;
}

/* CONTAINER */

.container{

max-width:1100px;
width:100%;

display:flex;
gap:60px;
align-items:center;
justify-content:center;

}

/* TEXTO */

.texto{

max-width:380px;

background:rgba(0,0,0,0.35);

padding:26px;

border-radius:12px;

backdrop-filter:blur(0px);

}

.texto h1{

font-family:"Playfair Display", serif;

font-size:38px;

line-height:1.2;

margin:0;

color:#F9AC1E;

}

.texto p{

font-size:17px;

line-height:1.6;

margin-top:16px;

color:#f0f0f0;

}

.indicador{

margin-top:14px;

font-size:15px;

color:#F5A623;

}

/* MAPA */

.mapa{

width:520px;

display:flex;
justify-content:center;

}

.mapa svg{
width:100%;
max-width:420px;
}

/* MOBILE */

@media (max-width:900px){

body{
padding:4px 18px 18px 18px;
align-items:flex-start;
}

/* layout vertical */

.container{
flex-direction:column;
gap:10px;
margin-top:-10px;
}

/* mapa */

.mapa{
order:-1;
width:100%;
margin-top:-25px;
}

.mapa svg{
max-width:390px;
}

/* texto */

.texto{
max-width:100%;
padding:18px;
margin-top:-40px;
}

.texto h1{
font-size:28px;
}

.texto p{
font-size:16px;
}

.indicador{
text-align:center;
}

}

</style>

</head>

<body>

<div class="container">

<!-- TEXTO -->

<div class="texto">

<h1>Descubra as Igrejas mais impressionantes da Itália</h1>

<p>
Explore as regiões da Itália e descubra igrejas que atravessaram séculos de fé, arte e história.
</p>

<div class="indicador">
Toque na região do mapa para explorar
</div>

</div>

<!-- MAPA -->

<div class="mapa">

<svg viewBox="0 0 600 900">

<image href="mapa-italia-transparente.png" width="600" height="900"/>

<a href="../lazio/index.html" class="link-mapa">

<title>Ir para Roma</title>

<path
d="M270 380
L310 380
L350 380
L350 430
L370 480
L330 480
L290 480
L250 430
L260 380 Z"

fill="transparent"
cursor="pointer"/>

</a>

</svg>

</div>

</div>

<script>

document.querySelectorAll(".link-mapa").forEach(function(link){

link.addEventListener("click", function(e){

e.preventDefault()

const destino = link.getAttribute("href")

document.body.classList.add("fade-out")

setTimeout(function(){

window.location.href = destino

},250)

})

})

</script>

</body>
</html>
