<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mapa das Igrejas da Itália</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
min-height:100vh;

font-family:"Inter", sans-serif;

background-image:url("coliseu.jpg");
background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

padding:40px;

}

/* ESCURECER FUNDO */

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* FADE */

.fade-out{
opacity:0;
transition:opacity .25s ease;
}

/* CONTAINER */

.container{

max-width:1200px;
width:100%;

display:flex;
gap:60px;
align-items:center;
justify-content:center;

}

/* TEXTO */

.texto{

max-width:420px;

background:rgba(0,0,0,0.45);

padding:30px;

border-radius:14px;

backdrop-filter:blur(4px);

color:#F4A81C;

}

.texto h1{

font-family:"Playfair Display", serif;

font-size:40px;

line-height:1.15;

margin:0;

color:#F9AC1E;

}

.texto p{

font-size:18px;

line-height:1.6;

margin-top:18px;

color:#eaeaea;

}

/* INDICADOR */

.indicador{

margin-top:20px;

font-size:16px;

color:#F5A623;

opacity:0.9;

}

/* MAPA */

.mapa{

width:560px;

display:flex;
flex-direction:column;
align-items:center;

}

/* CARD DO MAPA */

.mapa-card{

background:rgba(0,0,0,0.45);

padding:22px;

border-radius:16px;

box-shadow:0 15px 40px rgba(0,0,0,0.5);

backdrop-filter:blur(4px);

}

/* SVG */

.mapa svg{
width:100%;
max-width:420px;
display:block;
}

/* REGIÃO INTERATIVA */

.regiao-lazio{

fill:rgba(255,215,0,0.55);
stroke:#FFD700;
stroke-width:2;

animation:pulse 2.4s infinite;

}

@keyframes pulse{

0%{opacity:1}

50%{opacity:.6}

100%{opacity:1}

}

/* MOBILE */

@media (max-width:900px){

body{
padding:20px;
align-items:flex-start;
}

.container{

flex-direction:column;

gap:28px;

}

/* MAPA VEM PRIMEIRO NO MOBILE */

.mapa{
order:-1;
width:100%;
}

.texto{
max-width:100%;
padding:26px;
}

.texto h1{
font-size:32px;
}

.texto p{
font-size:17px;
}

.mapa svg{
max-width:360px;
}

.indicador{
text-align:center;
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- TEXTO -->

<div class="texto">

<h1>Descubra as Igrejas mais impressionantes da Itália</h1>

<p>
Explore as regiões da Itália e descubra igrejas que atravessaram séculos de fé, arte e história.
</p>

<p>
Comece por Roma e inicie essa jornada.
</p>

<div class="indicador">
Toque na região do mapa para explorar
</div>

</div>

<!-- MAPA -->

<div class="mapa">

<div class="mapa-card">

<svg viewBox="0 0 600 900">

<image href="mapa-italia-transparente.png" width="600" height="900"/>

<a href="../lazio/index.html" class="link-mapa">

<title>Ir para Roma</title>

<path
class="regiao-lazio"
d="M270 380
L310 380
L350 380
L350 430
L370 480
L330 480
L290 480
L250 430
L260 380 Z"

cursor="pointer"/>

</a>

</svg>

</div>

</div>

</div>

<script>

document.querySelectorAll(".link-mapa").forEach(function(link){

link.addEventListener("click", function(e){

e.preventDefault()

const destino = link.getAttribute("href")

document.body.classList.add("fade-out")

setTimeout(function(){

window.location.href = destino

},250)

})

})

</script>

</body>
</html>
