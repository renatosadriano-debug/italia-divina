<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mapa das Igrejas da Itália</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
height:100vh;

font-family:"Playfair Display", serif;

background-image:url("coliseu.jpg");
background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 8vw;

overflow:hidden;
}

.fade-out{
opacity:0;
transition:opacity .25s ease;
}

/* TEXTO */

.texto{

width:450px;

background:rgba(0,0,0,0.42);

padding:34px 36px;

border-radius:8px;

color:#F4A81C;

text-align:justify;

}

.texto h1{

font-size:40px;
line-height:1.2;
margin:0;
font-weight:700;
letter-spacing:0.5px;
color:#F9AC1E;

}

.texto p{

font-size:18px;
line-height:1.7;
margin-top:14px;

}

/* MAPA */

.mapa{

position:relative;
width:560px;

}

.mapa svg{
image-rendering:crisp-edges;
}

/* 📱 AJUSTES SOMENTE PARA CELULAR */

@media (max-width:768px){

body{

flex-direction:column;
justify-content:center;
align-items:center;

padding:20px;

}

/* caixa de texto menor */

.texto{

width:90%;

padding:24px;

border-radius:14px;

background:rgba(0,0,0,0.55);

backdrop-filter:blur(6px);

}

/* título menor */

.texto h1{

font-size:34px;

}

/* texto confortável */

.texto p{

font-size:18px;

}

/* mapa sobe e ganha contraste */

.mapa{

margin-top:20px;

padding:14px;

background:rgba(0,0,0,0.35);

border-radius:14px;

backdrop-filter:blur(6px);

}

/* mapa menor e visível */

.mapa svg{

width:260px;

filter:brightness(1.4) contrast(1.2);

}

}

</style>

</head>

<body>

<!-- TEXTO -->

<div class="texto">

<h1>Descubra as Igrejas mais impressionantes da Itália</h1>

<p>
Da grandiosidade de Roma às joias escondidas que poucos viajantes conhecem, cada região da Itália guarda igrejas que atravessaram séculos de arte, fé e história.
</p>

<p>
Comece por Roma e inicie essa jornada. Clique no mapa.
</p>

</div>

<!-- MAPA -->

<div class="mapa">

<svg viewBox="0 0 600 900" width="560">

<image href="mapa-italia-transparente.png" width="600" height="900"/>

<a href="../lazio/index.html" class="link-mapa">

<title>Ir para Roma</title>

<path
d="M270 380
L310 380
L350 380
L350 430
L370 480
L330 480
L290 480
L250 430
L260 380 Z"

fill="transparent"
stroke="none"
cursor="pointer"/>

</a>

</svg>

</div>

<script>

document.querySelectorAll(".link-mapa").forEach(function(link){

link.addEventListener("click", function(e){

e.preventDefault()

const destino = link.getAttribute("href")

document.body.classList.add("fade-out")

setTimeout(function(){

window.location.href = destino

},250)

})

})

</script>

</body>
</html>
