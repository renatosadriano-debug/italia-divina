<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mapa das Igrejas da Itália</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
min-height:100vh;

font-family:"Inter", sans-serif;

background-image:url("coliseu.jpg");
background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

padding:40px;

}

.fade-out{
opacity:0;
transition:opacity .25s ease;
}

/* CONTAINER */

.container{

max-width:1200px;
width:100%;

display:flex;
gap:60px;
align-items:center;

}

/* TEXTO */

.texto{

max-width:420px;

background:rgba(0,0,0,0.45);

padding:28px;

border-radius:10px;

color:#F4A81C;

text-align:justify;

}

.texto h1{

font-family:"Playfair Display", serif;

font-size:38px;

line-height:1.2;

margin:0;

color:#F9AC1E;

}

.texto p{

font-size:18px;

line-height:1.7;

margin-top:16px;

color:#f0f0f0;

}

/* MAPA */

.mapa{

width:560px;

}

.mapa svg{
width:100%;
}

/* INDICADOR */

.indicador{

margin-top:18px;

font-size:15px;

color:#F5A623;

opacity:0.9;

}

/* MOBILE */

@media (max-width:900px){

.container{

flex-direction:column;

gap:30px;

padding:0 10px;

}

.texto{

max-width:100%;

}

.texto h1{

font-size:34px;

}

.texto p{

font-size:18px;

}

.mapa{

width:100%;

max-width:420px;

}

.indicador{

text-align:center;

font-size:16px;

}

}

</style>

</head>

<body>

<div class="container">

<!-- TEXTO -->

<div class="texto">

<h1>Descubra as Igrejas mais impressionantes da Itália</h1>

<p>
Da grandiosidade de Roma às joias escondidas que poucos viajantes conhecem, cada região da Itália guarda igrejas que atravessaram séculos de arte, fé e história.
</p>

<p>
Comece por Roma e inicie essa jornada.
</p>

<div class="indicador">
Toque na região do mapa para explorar
</div>

</div>

<!-- MAPA -->

<div class="mapa">

<svg viewBox="0 0 600 900">

<image href="mapa-italia-transparente.png" width="600" height="900"/>

<a href="../lazio/index.html" class="link-mapa">

<title>Ir para Roma</title>

<path
d="M270 380
L310 380
L350 380
L350 430
L370 480
L330 480
L290 480
L250 430
L260 380 Z"

fill="transparent"
stroke="none"
cursor="pointer"/>

</a>

</svg>

</div>

</div>

<script>

document.querySelectorAll(".link-mapa").forEach(function(link){

link.addEventListener("click", function(e){

e.preventDefault()

const destino = link.getAttribute("href")

document.body.classList.add("fade-out")

setTimeout(function(){

window.location.href = destino

},250)

})

})

</script>

</body>
</html>
