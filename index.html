<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<title>Itália Divina — Lázio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
background:#000;
font-family:'Inter', sans-serif;
color:white;
}

/* HERO */

.hero{
position:relative;
height:100vh;
background-image:url("https://images.unsplash.com/photo-1531572753322-ad063cecc140?q=80&w=1920");
background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

padding:20px;
}

/* OVERLAY */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
to bottom,
rgba(0,0,0,0.35),
rgba(0,0,0,0.70)
);
}

/* LINK CAPA */

.link-capa{
text-decoration:none;
color:inherit;
}

/* CAIXA CENTRAL */

.capa-box{

position:relative;

max-width:820px;

padding:36px;

background:rgba(0,0,0,0.42);

border-radius:14px;

box-shadow:0 20px 50px rgba(0,0,0,0.55);

}

/* TEXTOS */

.guia{
font-size:14px;
letter-spacing:3px;
text-transform:uppercase;
color:#F2A81D;
margin-bottom:10px;
}

.titulo{
font-family:'Playfair Display', serif;
font-size:72px;
font-weight:700;
color:#F2A81D;
margin-bottom:6px;
}

.subtitulo{
font-size:26px;
margin-bottom:18px;
}

.regiao{
font-size:18px;
letter-spacing:2px;
margin-bottom:18px;
color:#e0e0e0;
}

.descricao{
font-size:20px;
line-height:1.6;
margin-bottom:24px;
text-align:justify;
}

.destaque{
font-weight:600;
color:#F2A81D;
}

/* AUTOR */

.autor{

margin-top:24px;

font-family:'Playfair Display', serif;

font-size:18px;

letter-spacing:1px;

color:#d8d8d8;

}

/* BOTÃO AÇÃO */

.entrar{

margin-top:26px;

font-size:22px;
font-weight:600;

color:#F2A81D;

transition:0.2s;

}

.link-capa:hover .entrar{
transform:translateX(6px);
}

/* MOBILE */

@media (max-width:600px){

.capa-box{
padding:24px;
}

.titulo{
font-size:52px;
}

.subtitulo{
font-size:22px;
}

.regiao{
font-size:18px;
}

.descricao{
font-size:20px;
}

.autor{
font-size:16px;
}

.entrar{
font-size:20px;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="overlay"></div>

<a href="mapa-italia/index.html" class="link-capa">

<div class="capa-box">

<div class="guia">
Guia Visual das Igrejas da Itália
</div>

<div class="titulo">
ITÁLIA DIVINA
</div>

<div class="subtitulo">
10 igrejas que vão transformar sua viagem
</div>

<div class="regiao">
Região do Lázio
</div>

<div class="descricao">

<span class="destaque">5 igrejas imperdíveis</span>  
+  
<span class="destaque">5 tesouros escondidos</span>

<br><br>

Uma jornada espiritual  
e uma experiência <span class="destaque">inesquecível</span>.

</div>

<div class="autor">
Renato Adriano Turazi
</div>

<div class="entrar">
Explorar o mapa →
</div>

</div>

</a>

</section>

<script>
if ('serviceWorker' in navigator) {

navigator.serviceWorker.register('service-worker.js')
.then(function(registration){
console.log("Service Worker registrado:", registration);
})
.catch(function(error){
console.log("Erro ao registrar Service Worker:", error);
});

}
</script>

</body>
</html>
